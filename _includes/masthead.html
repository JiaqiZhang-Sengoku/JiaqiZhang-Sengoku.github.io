<style>
.masthead {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.84);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(102, 126, 234, 0.10);
  box-shadow: 0 8px 24px rgba(20, 32, 70, 0.05);
}

.masthead__inner-wrap {
  max-width: 1500px;
  margin: 0 auto;
  padding: 10px 22px;
}

.greedy-nav {
  min-height: 46px;
}

.masthead__menu .visible-links {
  gap: 8px;
  align-items: center;
}

.masthead__menu-item {
  margin: 0;
}

.masthead__menu-item a {
  display: inline-flex;
  align-items: center;
  padding: 8px 13px;
  border-radius: 999px;
  color: #344563;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: background 0.22s ease, color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
}

.masthead__menu-item a:hover {
  background: rgba(77, 99, 210, 0.09);
  color: #22345e;
  transform: translateY(-1px);
}

.masthead__menu-home-item a {
  background: rgba(77, 99, 210, 0.10);
  color: #22345e;
}

.masthead__menu-home-item a:hover {
  background: rgba(77, 99, 210, 0.16);
}

.greedy-nav button {
  border-radius: 12px;
}

@media (max-width: 900px) {
  .masthead__inner-wrap {
    padding: 10px 16px;
  }
}
</style>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button aria-label="Toggle menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="#about-me">Homepage</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{% if link.url contains 'http' %}{{ link.url }}{% else %}{{ link.url | relative_url }}{% endif %}">
                {{ link.title }}
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
