<style>
.masthead {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--section-border, #e3e9f2);
  box-shadow: 0 4px 18px rgba(26, 39, 70, 0.05) !important;
}

.masthead__inner-wrap {
  max-width: 1500px;
  margin: 0 auto;
  padding: 8px 18px;
}

.greedy-nav {
  min-height: 0;
}

.masthead__menu .visible-links {
  gap: 6px;
  align-items: center;
}

.masthead__menu-item {
  margin: 0;
}

.masthead__menu-item a {
  display: inline-flex;
  align-items: center;
  padding: 7px 12px;
  border-radius: 999px;
  color: var(--heading-color, #202b3d);
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.masthead__menu-item a:hover {
  background: var(--accent-soft, rgba(59, 95, 199, 0.11));
  color: var(--accent, #3b5fc7);
  transform: translateY(-1px);
}

.masthead__menu-home-item a {
  background: transparent !important;
  color: var(--heading-color, #202b3d);
  box-shadow: none !important;
  text-shadow: none !important;
  padding-left: 0;
  padding-right: 0;
}

.masthead__menu-home-item a::before,
.masthead__menu-home-item a::after {
  content: none !important;
  display: none !important;
}

.masthead__menu-home-item a:hover {
  background: transparent !important;
  box-shadow: none !important;
  transform: none;
}

.greedy-nav button {
  border-radius: 12px;
}

@media (max-width: 900px) {
  .masthead__inner-wrap {
    padding: 8px 14px;
  }
}
</style>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button aria-label="Toggle menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="#about-me">Homepage</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{% if link.url contains 'http' %}{{ link.url }}{% else %}{{ link.url | relative_url }}{% endif %}">
                {{ link.title }}
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
