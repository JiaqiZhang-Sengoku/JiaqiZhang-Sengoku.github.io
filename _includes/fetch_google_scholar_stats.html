<script>
  window.addEventListener("DOMContentLoaded", function () {
    var citationEles = document.getElementsByClassName("show_paper_citations");

    if (!citationEles.length) {
      return;
    }

    {% if site.google_scholar_stats_use_cdn %}
    var gsDataBaseUrl = "https://cdn.jsdelivr.net/gh/{{ site.repository }}@";
    {% else %}
    var gsDataBaseUrl = "https://raw.githubusercontent.com/{{ site.repository }}/";
    {% endif %}

    fetch(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
      .then(function (response) {
        if (!response.ok) {
          throw new Error("Google Scholar stats request failed");
        }
        return response.json();
      })
      .then(function (data) {
        Array.prototype.forEach.call(citationEles, function (element) {
          var paperId = element.getAttribute("data");
          var publication = data.publications && data.publications[paperId];

          if (publication) {
            element.innerHTML = "| Citations: " + publication.num_citations;
          }
        });
      })
      .catch(function () {});
  });
</script>
